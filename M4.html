<html>
<head>
<title>operators</title>
</head>
<body>
<script>

let a=13;
let b=45;


document.write("add of two numbers is :" +(a+b)+ "<br>");
document.write("subtract of two numbers is :"+(a-b)+ "<br>");
document.write("multi of two numbers is :"+(a*b)+ "<br>");
document.write("div of two numbers is :"+(a/b)+ "<br>");
document.write("modulus of two numbers is :"+(a%b)+ "<br>");
document.write("power of two numbers is :"+(a**b)+ "<br>");


let a=20;

document.write(a+"<br>");
document.write(a+=5);




</script>
</body>
</html>
