<!DOCTYPE html>
<html>
<head>
    <title>Classroom Projector</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#e6e6e6;
        }

        
        .screen{
            width:700px;
            height:420px;
            background:white;
            border:8px solid #444;
            text-align:center;
            padding-top:40px;
            box-shadow:0 0 10px gray;
        }

        .google{
            font-size:70px;
            font-weight:bold;
            margin-bottom:30px;
        }

        .blue{color:#4285F4;}
        .red{color:#EA4335;}
        .yellow{color:#FBBC05;}
        .green{color:#34A853;}

        input{
            width:70%;
            padding:12px;
            font-size:18px;
            border:1px solid #ccc;
            border-radius:25px;
        }

        h2{
            text-align:center;
            margin-top:20px;
        }
    </style>
</head>

<body>

<h2>Google Page</h2>

    <div class="screen">
        <div class="google">
            <span class="blue">G</span>
            <span class="red">o</span>
            <span class="yellow">o</span>
            <span class="blue">g</span>
            <span class="green">l</span>
            <span class="red">e</span>
        </div>

        <input type="text" placeholder="Search Google">
    </div>


</body>
</html>
