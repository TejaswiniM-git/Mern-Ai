<!DOCTYPE html>
<html>
<head>
    <title>Google Page</title>

    <style>
        body{
            background-color:lightgray;
            font-family:Arial;
            text-align:center;
        }

        .screen{
            width:700px;
            height:420px;
            background-color:white;
            border:5px solid black;
            margin:40px auto;
            padding-top:60px;
        }

        .logo{
            font-size:80px;
            font-weight:bold;
        }

        .input{
            width:70%;
            padding:12px;
            font-size:18px;
            border:1px solid gray;
            border-radius:25px;
            margin-top:60px;
	
        }
    </style>
</head>

<body>

<h2>Google Home Page</h2>

<div class="screen">

    <div class="logo">
        <span style="color:blue;">G</span>
        <span style="color:red;">o</span>
        <span style="color:gold;">o</span>
        <span style="color:blue;">g</span>
        <span style="color:green;">l</span>
        <span style="color:red;">e</span>
    </div>

    <input type="text" placeholder="Search Google">

</div>

</body>
</html>
