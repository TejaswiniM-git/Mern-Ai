<!DOCTYPE html>

<html>

<head>

    <title>MySite</title>

    <style>

        *{

            margin:0;

            padding:0;

            box-sizing:border-box;

            font-family:Arial,sans-serif;

        }

        header{

            background:#333;

            color:white;

            display:flex;

            justify-content:space-between;

            align-items:center;

            padding:15px 30px;

        }

        header a{

            color:white;

            text-decoration:none;

            margin-left:20px;

        }

        section{

            padding:50px;

            text-align:center;

        }

        .hero{

            background:yellow;

        }

        .hero button{

            padding:10px 20px;

            margin-top:20px;

            background:#555;

            color:white;

            border:none;

        }

        .features{

            display:flex;

            justify-content:space-around;
		box-shadow:2px;

            background:white;

        }

    </style>

</head>

<body>

<header>

    <h2>MySite</h2>

    <nav>

        <a href="#">Home</a>

        <a href="#">Features</a>

        <a href="#">About</a>

    </nav>

</header>

<section class="hero">

    <h1>Welcome to MySite</h1>

    <p>A simple landing page built for practicing HTML and CSS.</p>

    <button>Get Started</button>

</section>

<section class="features">

    <div>

        <h3>Simple</h3>

        <p>Easy to understand and use.</p>

    </div>

    <div>

        <h3>Responsive Layout</h3>

        <p>Looks good on every screen.</p>

    </div>

    <div>

        <h3>Practice Friendly</h3>

        <p>Great starting point to learn.</p>

    </div>

</section>

</body>

</html>
