<!DOCTYPE html>
<html>
<head>
<title>Google</title>

<style>

body{
    margin:0;
    font-family:Arial;
}

.top{
    text-align:right;
    padding:20px;
}

.top a{
    text-decoration:none;
    color:black;
    margin:10px;
}

.top a:hover{
    text-decoration:underline;
}

.logo{
    text-align:center;
    margin-top:100px;
}

.logo img{
    width:500px;
	backgrouund-color:white;
}

.search{
    text-align:center;
    margin-top:30px;
}

.search input{
    width:500px;
    padding:12px;
    font-size:18px;
    border:1px solid gray;
    border-radius:25px;
    outline:none;
    box-shadow:0px 0px 10px lightgray;
}

.search input:hover{
    box-shadow:0px 0px 15px gray;
}

.buttons{
    text-align:center;
    margin-top:30px;
}

.buttons input{
    padding:10px 20px;
    margin:5px;
    border:none;
    background-color:white;
    cursor:pointer;
}

.buttons input:hover{
    border:1px solid gray;
}

</style>

</head>

<body>

<div class="top">
	<a href="#">login</a>
    <a href="#">Gmail</a>
    <a href="#">Images</a>
</div>

<div class="logo">
    <img src="goog.jpg" alt="Google Logo">
</div>

<div class="search">
    <input type="text" placeholder="Search Google or type a URL">
</div>

<div class="buttons">
    <input type="button" value="Google Search">
    <input type="button" value="I'm Feeling Lucky">
</div>

</body>
</html>
