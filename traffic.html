<!DOCTYPE html>
<html>
<head>
    <style>
        /* Center the layout on the screen */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }

        /* The light green frame */
        .box {
            width: 120px;
            height: 280px;
            background-color: #e0f2f1;
            border: 4px solid #b2dfdb;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 15px 0;
        }

        /* Base circle shape */
        .circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
        }

        /* Light colors */
        .red { background-color: #ff3333; }
        .yellow { background-color: #ffcc00; }
        .green { background-color: #33cc33; }

        /* The stick underneath */
        .stick {
            width: 20px;
            height: 100px;
            background-color: #b2dfdb;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div>
        <div class="box">
            <div class="circle red"></div>
            <div class="circle yellow"></div>
            <div class="circle green"></div>
        </div>
        
        <div class="stick"></div>
    </div>

</body>
</html>
