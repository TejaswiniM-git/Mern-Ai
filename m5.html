</head>
<body>
<script>

let a=20;

document.write(a+"<br>");
document.write("add is :"+(a+=5)+"<br>");

document.write("sub is :"+(a-=5)+"<br>");
document.write("mod is :"+(a%=3)+"<br>");
document.write("multi is :"+(a*=3)+"<br>");
document.write("div is :"+(a/=3)+"<br>");

let b=10;

if(b>5){
	document.write("true"+"<br>");
}

else{
	document.write("false"+"<br>");
}

let x=52;

if(x>90 && x<80)
{
	document.write("a"+"<br>");
}

else if(x>80 && x<70) 
{
	document.write("b "+"<br>");
}

else
{
	document.write("c"+"<br>");
}
</script>
</body>
</html>
